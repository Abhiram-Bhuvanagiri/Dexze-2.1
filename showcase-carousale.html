                /* Nav Hover Staggered Dial Effect */
        .staggered-hover {
            display: inline-flex;
            vertical-align: top;
            perspective: 600px;
        }
        .staggered-hover span {
            position: relative;
            display: inline-block;
            transition: transform 0.9s cubic-bezier(0.19, 1, 0.22, 1);
            transition-delay: var(--delay);
            white-space: pre;
            transform-style: preserve-3d;
        }
        .staggered-hover span::after {
            content: attr(data-char);
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            text-align: center;
            transform: rotateX(-90deg);
            transform-origin: center top;
        }
        .tdmenu__nav ul.navigation li a:hover .staggered-hover span {
            transform: translateY(-100%) rotateX(90deg);
        }
</style>\n</head>
